name: Release Libs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (np. v1.0.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "SzamboCode Libs ${{ steps.tag.outputs.name }}"
          generate_release_notes: true
          body: |
            ## SzamboCode Libs ${{ steps.tag.outputs.name }}

            Paczka bibliotek dla pluginów SzamboCode.

            ### 📦 Paper
            Biblioteki dla Paper/Spigot serverów.

            ### 🚀 Velocity
            Biblioteki dla Velocity proxy.

            > Pliki `manifest.txt` i `version.properties` zawierają listę i wersje bibliotek.
          files: |
            paper/*.jar
            paper/manifest.txt
            paper/version.properties
            velocity/*.jar
            velocity/manifest.txt
            velocity/version.properties
