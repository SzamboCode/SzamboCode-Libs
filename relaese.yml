name: Release Libs

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SzamboCode Libs ${{ github.ref_name }}"
          body: |
            ## Biblioteki ${{ github.ref_name }}
            
            ### Paper
            Biblioteki dla Paper/Spigot serwerów.
            
            ### Velocity
            Biblioteki dla Velocity proxy.
          files: |
            paper/*.jar
            velocity/*.jar
            paper/manifest.txt
            paper/version.properties
